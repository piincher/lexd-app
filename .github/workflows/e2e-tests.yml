name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'chinalinexpress/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'chinalinexpress/**'

jobs:
  # iOS E2E Tests
  e2e-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: chinalinexpress

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chinalinexpress/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Detox
        run: npm install -g detox

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.x'

      - name: Install iOS dependencies
        run: |
          cd ios && pod install && cd ..

      - name: Cache Detox build
        uses: actions/cache@v3
        with:
          path: ios/build
          key: detox-ios-build-${{ hashFiles('ios/**/*', 'src/**/*') }}
          restore-keys: |
            detox-ios-build-

      - name: Build iOS app for testing
        run: detox build --configuration ios.simulator

      - name: Run E2E tests
        run: detox test --configuration ios.simulator --cleanup --headless
        timeout-minutes: 20

      - name: Upload artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-ios-artifacts
          path: |
            chinalinexpress/artifacts/
            chinalinexpress/ios/build/Logs/
          retention-days: 5

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-results
          path: chinalinexpress/artifacts/
          retention-days: 3

  # Android E2E Tests
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: chinalinexpress

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chinalinexpress/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Detox
        run: npm install -g detox

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android dependencies
        run: |
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" "emulator"
          sdkmanager "system-images;android-30;google_apis;x86_64"

      - name: Create Android Emulator
        run: |
          echo "no" | avdmanager create avd -n Pixel_4_API_30 -k "system-images;android-30;google_apis;x86_64" --device "pixel_4"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Cache Detox build
        uses: actions/cache@v3
        with:
          path: android/app/build
          key: detox-android-build-${{ hashFiles('android/**/*', 'src/**/*') }}
          restore-keys: |
            detox-android-build-

      - name: Build Android app for testing
        run: detox build --configuration android.emulator

      - name: Start Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          avd-name: Pixel_4_API_30
          script: |
            cd chinalinexpress
            detox test --configuration android.emulator --cleanup --headless
        timeout-minutes: 25

      - name: Upload artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-android-artifacts
          path: |
            chinalinexpress/artifacts/
            chinalinexpress/android/app/build/outputs/
          retention-days: 5

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-android-results
          path: chinalinexpress/artifacts/
          retention-days: 3

  # Test Summary
  e2e-summary:
    needs: [e2e-ios, e2e-android]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: E2E Test Summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| iOS | ${{ needs.e2e-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android | ${{ needs.e2e-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.e2e-ios.result }}" == "success" ] && [ "${{ needs.e2e-android.result }}" == "success" ]; then
            echo "✅ All E2E tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some E2E tests failed. Check artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi
